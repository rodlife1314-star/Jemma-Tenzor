# CPU-safe evaluation and validation pipeline trigger
# Target Repository: rodlife1314/tensorrt-edge-llm (branch: main)
# Use this to confirm packaging, script syntax, and structural integration without requiring expensive GPU quotas.

steps:
  # Step 1: Initialize local environment checks and log current metadata
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Environment Audit'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=========================================================="
        echo "🔷 OCTAGON OS [EXPORT] PIPELINE AUDIT"
        echo "=========================================================="
        echo "Build Trigger: tensorrt-edge-llm-trigger"
        echo "Branch: main"
        echo "Target Zone: us-central1"
        echo "Active Operator: rodlife1314"
        echo "Timestamp: $(date -u)"
        
  # Step 2: Validate Dockerfile.export syntax by building a lightweight CPU image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Exporter Container'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tensorrt-edge/exporter:latest',
      '-f', 'Dockerfile.export',
      '.'
    ]

  # Step 3: Run static validation inside the constructed configuration
  - name: 'us-central1-docker.pkg.dev/$PROJECT_ID/tensorrt-edge/exporter:latest'
    id: 'Dry Run Config Check'
    entrypoint: '/workspace/entrypoint.sh'
    args: ['validate']

  # Step 4: Push the safe export image to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Publish Exporter'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/tensorrt-edge/exporter:latest']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
