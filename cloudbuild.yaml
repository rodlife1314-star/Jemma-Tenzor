# Pathfinder v0.1 - Compact Serverless CPU Build and Deploy Pipeline
# Target Repository: rodlife1314-star/Pathfinder (branch: main)
# Triggers lightweight container builds and rapid serverless Docker deployments to Cloud Run on standard CPU.

steps:
  # Step 1: Build lightweight CPU-safe production container
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Pathfinder Image'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/pathfinder/app:v0.1',
      '-f', 'Dockerfile',
      '.'
    ]

  # Step 2: Publish container to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Publish Pathfinder Image'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/pathfinder/app:v0.1']

  # Step 3: Deploy to Google Cloud Run (Standard Serverless CPU)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Pathfinder CPU Instance'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'pathfinder-service',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/pathfinder/app:v0.1',
      '--region', 'us-central1',
      '--port', '8080',
      '--ingress', 'all',
      '--allow-unauthenticated',
      '--cpu', '1',
      '--memory', '1Gi',
      '--platform', 'managed'
    ]

timeout: '600s'

